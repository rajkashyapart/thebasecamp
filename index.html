<script>

function skipIntro() {
  var vidWhite = document.getElementById('vid-white');
  var hl = document.getElementById('vid-headline');
  if (hl) hl.classList.add('out');
  setTimeout(function() {
    if (vidWhite) vidWhite.classList.add('flash');
    setTimeout(function() {
      var vs = document.getElementById('screen-video');
      var txtOv = document.getElementById('vid-text-overlay');
      var cover = document.getElementById('vid-cover');
      if (vs) { vs.classList.add('hidden'); vs.style.display = 'none'; }
      if (txtOv) txtOv.style.display = 'none';
      if (cover) cover.style.display = 'none';
      if (vidWhite) vidWhite.classList.add('to-warm');
      setTimeout(function() {
        if (vidWhite) vidWhite.classList.add('fade-out');
        setTimeout(function() {
          if (vidWhite) vidWhite.style.display = 'none';
          window.location.href = 'playground.html';
        }, 700);
      }, 100);
    }, 600);
  }, 300);
}

(function() {
  var logo = document.getElementById('raj-logo');
  var cover = document.getElementById('vid-cover');
  var hl = document.getElementById('vid-headline');
  if (!logo || !cover) return;

  var videoStarted = false;
  var videoEnded = false;
  var transitionStarted = false;
  var endFallbackTimer = null;

  // 0.15s - logo fades in and breathes while video buffers
  setTimeout(function() {
    logo.classList.add('in');
    logo.classList.add('waiting');
  }, 150);

  // On mobile, autoplay in iframes is often blocked — shorten the fallback so user isn't stuck
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  var fallbackMs = isMobile ? 4500 : 13000;
  var absoluteEndFallback = setTimeout(function() {
    if (!videoEnded) { videoEnded = true; doEndTransition(); }
  }, fallbackMs);

  // On mobile: show a "tap to skip" hint after 2s in case autoplay is blocked
  if (isMobile) {
    setTimeout(function() {
      if (!videoEnded && !videoStarted) {
        var skip = document.createElement('div');
        skip.id = 'vid-skip';
        skip.textContent = 'tap to skip';
        skip.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:30;font-family:"DM Mono",monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.45);cursor:pointer;padding:10px 20px;-webkit-tap-highlight-color:transparent;';
        skip.addEventListener('click', function() { if (!videoEnded) { videoEnded = true; clearTimeout(absoluteEndFallback); doEndTransition(); } });
        document.body.appendChild(skip);
      }
    }, 2000);
  }

  var playStartTime = 0;
  var timeupdateWatchdog = null;

  function scheduleEndCheck() {
    clearTimeout(timeupdateWatchdog);
    timeupdateWatchdog = setTimeout(function check() {
      if (videoEnded || !videoStarted) return;
      if ((Date.now() - playStartTime) > 3500) {
        // Enough play time has elapsed and timeupdate stopped — video ended
        videoEnded = true;
        clearTimeout(absoluteEndFallback);
        doEndTransition();
      } else {
        // Not enough play time yet, keep polling every 400ms
        timeupdateWatchdog = setTimeout(check, 400);
      }
    }, 900);
  }

  function onVideoPlay() {
    if (videoStarted) return;
    videoStarted = true;
    playStartTime = Date.now();
    logo.classList.remove('waiting');
    logo.classList.remove('in');
    logo.classList.add('out');
    // 400ms - cover dissolves revealing video
    setTimeout(function() { cover.classList.add('fade'); }, 400);
    // 700ms - headline fades in over live video
    setTimeout(function() { if (hl) hl.classList.add('show'); }, 700);
    scheduleEndCheck();
  }

  // Listen for postMessage events from Bunny player
  window.addEventListener('message', function(e) {
    if (!e.data) return;
    var data = e.data;
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch(ex) { return; }
    }
    if (typeof data !== 'object') return;
    var evt = data.event || '';
    // Any playback event confirms video is running; reset end-check window
    if (evt === 'play' || evt === 'playing' || evt === 'timeupdate') {
      onVideoPlay();
      if (videoStarted) { scheduleEndCheck(); }
    }
    // Video ended via postMessage
    if ((evt === 'videoEnded' || evt === 'ended' || evt === 'end') && !videoEnded) {
      videoEnded = true;
      clearTimeout(absoluteEndFallback);
      clearTimeout(timeupdateWatchdog);
      if (!videoStarted) { videoStarted = true; }
      doEndTransition();
    }
  });

  // Play fallback: if no postMessage at all within 2s, proceed anyway
  setTimeout(function() { onVideoPlay(); }, 2000);

  function doEndTransition() {
    if (transitionStarted) return;
    transitionStarted = true;
    clearTimeout(endFallbackTimer);
    clearTimeout(absoluteEndFallback);
    // Show playground beneath video before fading video out
    // Navigate to playground
    if (hl) hl.classList.add('out');
    var vs = document.getElementById('screen-video');
    if (vs) vs.classList.add('fading-out');
    setTimeout(function() {
      window.location.href = 'playground.html';
    }, 1100);
  }
})();

/* Playground */
var WCX = 1800, WCY = 1400;
</script>
